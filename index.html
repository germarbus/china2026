var HIST=[
{city:'Beijing',icon:'🏯',intro:'Capital de China desde hace 800 años. Aquí latió el corazón del imperio más poderoso de Asia.',sites:[
{name:'Ciudad Prohibida (故宫)',text:'Construida entre 1406 y 1420 por orden del emperador Yongle de la dinastía Ming, con 700.000 trabajadores y 100.000 artesanos. Durante 500 años fue el palacio imperial de China, hogar de 24 emperadores de las dinastías Ming y Qing. Con 9.999 habitaciones (una menos que el palacio celestial, por respeto a los dioses), es el complejo palaciego más grande del mundo: 72 hectáreas rodeadas por un foso de 6 metros de profundidad. Los tejados son amarillos porque ese color estaba reservado exclusivamente al emperador. Fue "prohibida" porque ningún plebeyo podía entrar sin permiso imperial, bajo pena de muerte. En 1925, tras la caída de la última dinastía, se abrió al público como museo. Hoy recibe 80.000 visitantes al día — por eso hay que reservar entrada con antelación.'},
{name:'Gran Muralla - Mutianyu (慕田峪长城)',text:'La Gran Muralla no es una sola muralla sino miles de tramos construidos durante 2.000 años por diferentes dinastías para proteger China de las invasiones del norte (mongoles, xiongnu, manchúes). Mutianyu es uno de los tramos mejor conservados, construido originalmente en el siglo VI por la dinastía Qi del Norte y reconstruido por la dinastía Ming en 1569. Tiene 23 torres de vigilancia a lo largo de 5 km, conectadas por un camino lo bastante ancho para que pasaran 5 caballos en fila. A diferencia de Badaling (el tramo más turístico y masificado), Mutianyu está rodeado de bosques de castaños y montañas. La muralla total mide 21.196 km — más que la distancia de Madrid a Tokio ida y vuelta. Dato: los soldados que la vigilaban podían comunicar una señal de alerta desde un extremo al otro en 24 horas usando fogatas.'},
{name:'Plaza de Tiananmén (天安门广场)',text:'La plaza pública más grande del mundo con 440.000 m² (cabría 10 veces la Puerta del Sol). Su nombre significa "Puerta de la Paz Celestial". Desde la puerta que da a la Ciudad Prohibida, Mao Zedong proclamó la República Popular China el 1 de octubre de 1949 con la frase: "El pueblo chino se ha puesto en pie". En el centro está el Mausoleo de Mao, donde reposa su cuerpo embalsamado (se puede visitar gratis). Al este, el Museo Nacional de China, el más visitado del mundo con 7 millones de visitas al año.'},
{name:'Palacio de Verano (颐和园)',text:'El jardín imperial más grande y mejor conservado de China: 290 hectáreas, de las cuales el 75% es agua (el lago Kunming). Construido en 1750 por el emperador Qianlong, fue destruido por tropas anglo-francesas en 1860 y reconstruido por la emperatriz Cixi en 1886... con el dinero que estaba destinado a la modernización de la armada china. Tiene el Corredor Largo de 728 metros, decorado con 14.000 pinturas, cada una diferente. Patrimonio UNESCO desde 1998.'},
{name:'Hutongs y Houhai (胡同)',text:'Los hutongs son los callejones tradicionales de Beijing, formados por filas de siheyuan (casas con patio central). Algunos tienen más de 700 años. En los años 80 había más de 3.000 hutongs; hoy quedan menos de 1.000, el resto demolidos para construir edificios modernos. Cada hutong tiene su historia: el más estrecho (Qianshi Hutong) mide solo 40 cm de ancho. La zona de Houhai es un lago rodeado de hutongs con bares, restaurantes y casas de té — el sitio perfecto para la primera noche en Beijing.'}
]},
{city:"Xi'an",icon:'🕌',intro:"Fue la capital de China durante 1.100 años y el inicio de la Ruta de la Seda. Aquí empezaba todo.",sites:[
{name:'Guerreros de Terracota (兵马俑)',text:'En 1974, unos campesinos cavando un pozo descubrieron por accidente el mayor hallazgo arqueológico del siglo XX. El primer emperador de China, Qin Shi Huang (260-210 a.C.), unificó China, estandarizó la escritura, la moneda y los pesos, construyó la primera versión de la Gran Muralla... y se hizo construir un ejército de 8.000 soldados de terracota a tamaño real para que le protegieran en el más allá. Cada guerrero tiene un rostro único — no hay dos iguales. Hay arqueros, infantes, generales y hasta caballos. Tardaron 40 años y 700.000 trabajadores en completar el mausoleo. Solo se ha excavado el 1% del complejo total. Se cree que la tumba principal contiene ríos de mercurio imitando los ríos de China.'},
{name:'Muralla de Xi\'an (西安城墙)',text:'La muralla mejor conservada de toda China, construida en 1370 durante la dinastía Ming sobre los cimientos de la muralla Tang del siglo VII. Tiene 14 km de perímetro, 12 metros de alto y 15 metros de ancho en la base — lo suficiente para que pasen 4 coches en paralelo por arriba. Se puede recorrer en bici (2h) o andando (4h). De noche se ilumina con miles de faroles rojos y el efecto es espectacular. Tiene 98 torres de vigilancia y 4 puertas principales orientadas a los puntos cardinales.'},
{name:'Barrio Musulmán (回民街)',text:'Xi\'an fue el punto de partida (o llegada) de la Ruta de la Seda durante más de 1.000 años. En el siglo VII, comerciantes árabes y persas llegaron por la ruta y se quedaron. Sus descendientes, los Hui, llevan más de 1.300 años aquí manteniendo su fe islámica y su gastronomía única. El barrio alberga la Gran Mezquita (742 d.C.), una de las más antiguas de China, con una mezcla única de arquitectura china y función islámica — parece un templo chino por fuera pero es una mezquita por dentro. La calle de comida es un festival: Roujiamo (la hamburguesa china original, anterior a la hamburguesa occidental), Yangrou Paomo, biángbiáng miàn, brochetas de cordero...'},
{name:'La Ruta de la Seda',text:'Xi\'an (entonces llamada Chang\'an, "Paz Eterna") fue la capital de 13 dinastías y una de las ciudades más grandes del mundo antiguo, con 1 millón de habitantes en el siglo VIII. Desde aquí partía la Ruta de la Seda: 7.000 km de caminos comerciales que conectaban China con Roma, pasando por Asia Central y Persia. Por ella viajaron la seda, la pólvora, el papel, la brújula, las especias, las religiones y las ideas. Marco Polo la recorrió en el siglo XIII.'}
]},
{city:'Chengdu',icon:'🐼',intro:'La capital del picante, los pandas y la buena vida. Los chengduenses dicen que su ciudad es la más relajada de China.',sites:[
{name:'Base de Pandas de Chengdu (成都大熊猫基地)',text:'El panda gigante es el animal más emblemático de China y uno de los más amenazados del planeta — quedan unos 1.800 en libertad, todos en las montañas de Sichuan. Esta base de investigación, fundada en 1987 con solo 6 pandas rescatados de las montañas, hoy alberga más de 200. Los pandas son solitarios, duermen 14 horas al día y comen 38 kg de bambú diarios (el bambú tiene tan pocas calorías que necesitan comer sin parar). Son más activos por la mañana (8-10h), así que madrugar merece la pena. El cachorro de panda pesa solo 100 gramos al nacer — 900 veces menos que su madre. China usa los pandas como herramienta diplomática: los presta a países aliados ("diplomacia panda").'},
{name:'Buda Gigante de Leshan (乐山大佛)',text:'El Buda de piedra más grande del mundo: 71 metros de alto (como un edificio de 23 pisos), tallado directamente en la roca de un acantilado junto al río Min. Lo construyeron entre 713 y 803 d.C. — tardaron 90 años. Lo mandó construir un monje budista llamado Haitong, que esperaba que el Buda calmara las turbulentas aguas del río que mataban a los pescadores. El ingenioso sistema de drenaje oculto en su pelo, ropa y orejas ha evitado la erosión durante 1.200 años. Solo sus pies miden 11 metros de ancho — caben 100 personas sentadas encima. Patrimonio UNESCO.'},
{name:'Callejón Kuan Zhai (宽窄巷子)',text:'Tres callejones paralelos que son el corazón cultural de Chengdu: el "ancho" (Kuan), el "estrecho" (Zhai) y el "de la cruz" (Jing). Construidos durante la dinastía Qing en 1718 como barrio residencial para soldados manchúes que custodiaban la frontera tibetana. Hoy son una mezcla de casas de té centenarias, galerías de arte, y la mejor comida callejera de Chengdu. Aquí podéis ver el Bian Lian (变脸, "cambio de cara"), una tradición secreta de la ópera de Sichuan donde los actores cambian de máscara en milésimas de segundo. El truco se transmite de maestro a discípulo y está protegido como secreto nacional.'},
{name:'La cocina de Sichuan (川菜)',text:'Chengdu es la primera ciudad del mundo nombrada "Ciudad de la Gastronomía" por la UNESCO (2010). La cocina sichuanesa se basa en el málà (麻辣): "má" es el adormecimiento que produce el grano de pimienta de Sichuan, y "là" es el picante del chile. Juntos crean una sensación única que no existe en ninguna otra cocina del mundo. El Hot Pot nació en Chongqing pero se perfeccionó en Chengdu. El Mapo Tofu lo inventó en 1862 una mujer con marcas de viruela en la cara ("mapo" = "abuela con marcas"). Los Dan Dan Mian los vendían hombres que cargaban los fideos en un palo de bambú por las calles.'}
]},
{city:'Zhangjiajie',icon:'🏔️',intro:'Las montañas que inspiraron Avatar. Un paisaje que parece de otro planeta.',sites:[
{name:'Parque Nacional y alrededores',text:'Zhangjiajie tiene su propia pestaña "Parque" con la guía completa día a día: rutas, consejos, mapa de puntos clave y equipamiento. La historia detallada de cada lugar (Avatar Mountain, Bailong, Tianmen, Puente de Cristal, Golden Whip, 72 Towers) está explicada allí con todo detalle.'}
]},
{city:'Fenghuang',icon:'🏘️',intro:'La Ciudad del Fénix. Dicen que quien la ve de noche, no la olvida jamás.',sites:[
{name:'Ciudad Antigua de Fenghuang (凤凰古城)',text:'Su nombre significa "Ciudad del Fénix" y fue fundada en 1704 durante la dinastía Qing. Está construida sobre pilotes de madera a orillas del río Tuojiang, en la frontera entre la cultura Han (mayoritaria en China) y las etnias Miao y Tujia. Las casas Diaojiaolou (吊脚楼, "casas con pies colgantes") se sostienen sobre el agua con pilares de madera, una técnica de construcción de más de 1.000 años. De noche, con las luces rojas reflejadas en el río y la niebla, parece un cuadro. El escritor Shen Congwen, nominado al Nobel, nació aquí y la inmortalizó en sus novelas. La etnia Miao tiene su propia lengua, vestimenta de plata elaboradísima, y tradiciones chamánicas que mantienen desde hace milenios.'},
{name:'Río Tuojiang y puentes de piedra',text:'El río Tuojiang divide la ciudad antigua en dos. Se puede recorrer en barca de madera (15 minutos) pasando bajo puentes de piedra centenarios. El más famoso es el puente de piedra que conecta los dos barrios principales, con vistas perfectas de las casas sobre pilotes a ambos lados. Las mejores fotos son desde el río al anochecer, cuando las linternas se encienden y el reflejo crea una imagen simétrica perfecta en el agua.'}
]},
