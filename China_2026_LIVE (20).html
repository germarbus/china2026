async function loadWeather(){
var el=document.getElementById('weatherData');if(!el)return;
// Build list of unique city+coords+dates from the trip
var cityDays={};
D.days.forEach(function(day){
var cl=day.cl||day.city.toLowerCase().split('→')[0].split('/')[0].trim();
var coords=null;
CM.forEach(function(c){if(c.n.toLowerCase().replace(/'/g,"'")==cl||cl.indexOf(c.n.toLowerCase())>=0)coords={la:c.la,lo:c.lo,n:c.n}});
if(!coords)return;
var key=coords.n;
if(!cityDays[key])cityDays[key]={coords:coords,days:[]};
cityDays[key].days.push({date:day.date,d:day.d,city:day.city});
});
var h='';
var fetches=[];
Object.keys(cityDays).forEach(function(key){
var cd=cityDays[key];
var url='https://api.open-meteo.com/v1/forecast?latitude='+cd.coords.la+'&longitude='+cd.coords.lo+'&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=Asia/Shanghai&forecast_days=16';
fetches.push(fetch(url).then(function(r){return r.json()}).then(function(data){
return{key:key,data:data,days:cd.days};
}).catch(function(){return{key:key,data:null,days:cd.days}}));
});
try{
var results=await Promise.all(fetches);
results.forEach(function(r){
if(!r.data||!r.data.daily){
// Fallback: show static
r.days.forEach(function(d){
h+='<div class="clc"><div class="cli">🌤️</div><div class="clinfo"><div class="ct">Día '+d.d+' · '+d.city+'</div><div class="cd">Previsión no disponible aún</div></div></div>';
});
return;
}
var daily=r.data.daily;
r.days.forEach(function(d){
// Try to match trip date with forecast date
// Trip dates: "2 may", "3 may" etc
// Forecast dates: "2026-05-02" etc
var matched=false;
for(var i=0;i<(daily.time||[]).length;i++){
var fd=new Date(daily.time[i]);
var fdStr=fd.getDate()+' '+MN[fd.getMonth()];
if(fdStr===d.date){
var tMax=Math.round(daily.temperature_2m_max[i]);
var tMin=Math.round(daily.temperature_2m_min[i]);
var rain=daily.precipitation_probability_max[i]||0;
var wcode=daily.weathercode[i]||0;
var winfo=getWCEmoji(wcode);
var emoji=winfo.split(' ')[0];
var desc=winfo.substring(emoji.length+1);
h+='<div class="clc"><div class="cli">'+emoji+'</div><div class="clinfo"><div class="ct">Día '+d.d+' · '+d.city+' <span style="font-size:.75em;color:var(--text2)">('+d.date+')</span></div><div class="cd">'+tMin+'°–'+tMax+'°C · '+desc+' · Lluvia: '+rain+'%</div></div></div>';
matched=true;break;
}}
if(!matched){
h+='<div class="clc"><div class="cli">📅</div><div class="clinfo"><div class="ct">Día '+d.d+' · '+d.city+'</div><div class="cd">Fuera del rango de previsión (se actualiza 16 días antes)</div></div></div>';
}});
});
if(!h)h='<p style="color:var(--text2);font-size:.85em">La previsión se activa 16 días antes del viaje.</p>';
el.innerHTML=h;
}catch(e){el.innerHTML='<p style="color:var(--text2);font-size:.85em">No se pudo cargar el clima. Se mostrará cuando haya previsión disponible.</p>';}
}
